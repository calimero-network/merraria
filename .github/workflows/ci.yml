name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  logic:
    name: Logic (contract tests + WASM build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: logic
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the toolchain; rustup picks it up automatically.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: logic
      - name: Contract unit tests (native, TestHost)
        run: cargo test
      - name: WASM build
        run: ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: logic/res/merraria.wasm

  e2e-mocked:
    name: E2E (Playwright, mocked node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: app/test-results

  e2e-merobox:
    name: E2E (2-node mining world over merobox)
    runs-on: ubuntu-latest
    needs: logic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: contract-wasm
          path: logic/res
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install merobox
        run: pip install merobox
      - name: Run 2-node world e2e (build → sync → break → converge)
        working-directory: workflows
        run: |
          for attempt in 1 2 3; do
            if merobox bootstrap run e2e.yml; then exit 0; fi
            echo "attempt ${attempt} failed — cleaning up and retrying"
            merobox stop --all || true
            rm -rf data
            sleep 5
          done
          exit 1
      - name: Stop nodes
        if: always()
        run: merobox stop --all || true

  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [app, logic, e2e-mocked, e2e-merobox]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Pull Vercel project settings
        run: pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (prebuilt output)
        run: pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        id: deploy
        run: echo "url=$(pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"
