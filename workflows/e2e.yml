name: Merraria — shared 2D mining world (2-node e2e)
description: >
  Proves the core thesis of merraria: a Calimero context carries a whole 2D
  multiplayer mining world as nothing but a tile-override diff + presence.

  Two nodes join one world (context). Both players join, Alice builds a plank
  shelter with a torch, Bob sees it via get_overrides, Bob digs one tile out
  (an explicit t=0 override — never a map-remove), Alice sees the dig, and the
  roster shows both miners online. Terrain (hills, caves, ores, lakes) never
  crosses the network — every client regenerates it from the seed.

force_pull_image: true

nodes:
  chain_id: testnet-1
  count: 2
  image: ghcr.io/calimero-network/merod:0.11.0-rc.13
  prefix: calimero-node
  # Off the default 2428/2528 AND off mero-blocks' 2760/2660 range.
  base_port: 2780
  base_rpc_port: 2680

steps:
  # ── Bootstrap ───────────────────────────────────────────────────────────
  - name: Install application on Node 1
    type: install_application
    node: calimero-node-1
    path: "../logic/res/merraria.wasm"
    dev: true
    outputs:
      app_id: applicationId

  - name: Install application on Node 2
    type: install_application
    node: calimero-node-2
    path: "../logic/res/merraria.wasm"
    dev: true

  - name: Create namespace
    type: create_namespace
    node: calimero-node-1
    application_id: "{{app_id}}"
    outputs:
      namespace_id: namespaceId

  - name: Set default member capabilities
    type: set_default_capabilities
    node: calimero-node-1
    group_id: "{{namespace_id}}"
    capabilities: 15

  - name: Generate identity for Node 2
    type: create_identity
    node: calimero-node-2
    outputs:
      bob_identity: publicKey

  - name: Wait for identity propagation
    type: wait
    seconds: 3

  - name: Node 1 creates invitation for Node 2
    type: create_namespace_invitation
    node: calimero-node-1
    group_id: "{{namespace_id}}"
    outputs:
      invite_bob: invitation

  - name: Node 2 joins namespace
    type: join_namespace
    node: calimero-node-2
    group_id: "{{namespace_id}}"
    invitation: "{{invite_bob}}"

  - name: Settle after namespace join
    type: wait
    seconds: 5

  # ── Create the world (context) ────────────────────────────────────────────
  - name: Node 1 creates the world
    type: create_context
    node: calimero-node-1
    application_id: "{{app_id}}"
    group_id: "{{namespace_id}}"
    params: '{"name": "surface", "seed": 42, "now": 1752264000}'
    outputs:
      world_id: contextId
      alice_key: memberPublicKey

  - name: Force Node 2 to sync namespace state
    type: sync_group
    node: calimero-node-2
    group_id: "{{namespace_id}}"

  - name: Settle after sync
    type: wait
    seconds: 5

  - name: Bob joins the world context
    type: join_context
    node: calimero-node-2
    context_id: "{{world_id}}"
    outputs:
      bob_key: memberPublicKey

  - name: Wait for world sync
    type: wait_for_sync
    context_id: "{{world_id}}"
    nodes: [calimero-node-1, calimero-node-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── The seed is the world ─────────────────────────────────────────────────
  - name: Bob reads world meta (seed + shared day clock)
    type: call
    node: calimero-node-2
    context_id: "{{world_id}}"
    method: world_meta
    args: {}
    executor_public_key: "{{bob_key}}"
    outputs:
      meta_bob: result

  - name: Assert the seed replicated to Node 2
    type: assert
    statements:
      - 'contains({{meta_bob}}, "42")'
      - 'contains({{meta_bob}}, "surface")'

  # ── Presence ───────────────────────────────────────────────────────────────
  - name: Alice joins the world
    type: call
    node: calimero-node-1
    context_id: "{{world_id}}"
    method: join
    args: { name: "Alice", now: 1752264001 }
    executor_public_key: "{{alice_key}}"

  - name: Bob joins the world
    type: call
    node: calimero-node-2
    context_id: "{{world_id}}"
    method: join
    args: { name: "Bob", now: 1752264002 }
    executor_public_key: "{{bob_key}}"

  - name: Sync presence
    type: wait_for_sync
    context_id: "{{world_id}}"
    nodes: [calimero-node-1, calimero-node-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Alice reads the roster
    type: call
    node: calimero-node-1
    context_id: "{{world_id}}"
    method: get_players
    args: { now: 1752264005 }
    executor_public_key: "{{alice_key}}"
    outputs:
      roster_alice: result

  - name: Assert both miners are in the roster
    type: assert
    statements:
      - 'contains({{roster_alice}}, "Alice")'
      - 'contains({{roster_alice}}, "Bob")'

  # ── Alice builds, Bob sees it ─────────────────────────────────────────────
  # x coords 210/211/212 are each a unique comma-free needle — merobox's
  # contains() splits its arguments on commas, so "210,55" can't be asserted.
  - name: Alice builds a plank shelter with a torch
    type: call
    node: calimero-node-1
    context_id: "{{world_id}}"
    method: set_tiles
    args:
      edits:
        - { x: 210, y: 55, t: 7 }
        - { x: 211, y: 55, t: 7 }
        - { x: 212, y: 54, t: 8 }
      now: 1752264010
    executor_public_key: "{{alice_key}}"

  - name: Sync Alice's edits
    type: wait_for_sync
    context_id: "{{world_id}}"
    nodes: [calimero-node-1, calimero-node-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Bob pulls the override diff
    type: call
    node: calimero-node-2
    context_id: "{{world_id}}"
    method: get_overrides
    args: {}
    executor_public_key: "{{bob_key}}"
    outputs:
      overrides_bob: result

  - name: Assert Bob received Alice's tiles
    type: assert
    statements:
      - 'contains({{overrides_bob}}, "210")'
      - 'contains({{overrides_bob}}, "211")'
      - 'contains({{overrides_bob}}, "212")'

  # ── Bob digs, Alice sees the explicit air override ───────────────────────
  - name: Bob digs out a wall tile (t=0, never a map-remove)
    type: call
    node: calimero-node-2
    context_id: "{{world_id}}"
    method: set_tiles
    args:
      edits:
        - { x: 211, y: 55, t: 0 }
      now: 1752264020
    executor_public_key: "{{bob_key}}"

  - name: Sync Bob's dig
    type: wait_for_sync
    context_id: "{{world_id}}"
    nodes: [calimero-node-1, calimero-node-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Alice pulls the override diff
    type: call
    node: calimero-node-1
    context_id: "{{world_id}}"
    method: get_overrides
    args: {}
    executor_public_key: "{{alice_key}}"
    outputs:
      overrides_alice: result

  - name: Assert the dig converged (all 3 keys still present, LWW upsert)
    type: assert
    statements:
      - 'contains({{overrides_alice}}, "211")'
      - 'contains({{overrides_alice}}, "210")'
      - 'contains({{overrides_alice}}, "212")'

  # ── Movement: heartbeats carry live transforms across nodes ──────────────
  # This is what "seeing each other" means in-game: the roster poll returns
  # the other miner's position/action from THEIR node's heartbeats.
  # x coords 305/317 are unique comma-free needles (merobox contains() quirk).
  - name: Alice heartbeats while mining at x=305
    type: call
    node: calimero-node-1
    context_id: "{{world_id}}"
    method: heartbeat
    args:
      t: { name: "Alice", x: 305, y: 66, dir: 1, sel: 0, action: "mining" }
      now: 1752264030
    executor_public_key: "{{alice_key}}"

  - name: Bob heartbeats while building at x=317
    type: call
    node: calimero-node-2
    context_id: "{{world_id}}"
    method: heartbeat
    args:
      t: { name: "Bob", x: 317, y: 48, dir: -1, sel: 2, action: "building" }
      now: 1752264031
    executor_public_key: "{{bob_key}}"

  - name: Sync heartbeats
    type: wait_for_sync
    context_id: "{{world_id}}"
    nodes: [calimero-node-1, calimero-node-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Bob polls the roster (as the frontend does every 500ms)
    type: call
    node: calimero-node-2
    context_id: "{{world_id}}"
    method: get_players
    args: { now: 1752264035 }
    executor_public_key: "{{bob_key}}"
    outputs:
      roster_bob_moves: result

  - name: Assert Bob sees Alice's live position and action
    type: assert
    statements:
      - 'contains({{roster_bob_moves}}, "305")'
      - 'contains({{roster_bob_moves}}, "mining")'

  - name: Alice polls the roster
    type: call
    node: calimero-node-1
    context_id: "{{world_id}}"
    method: get_players
    args: { now: 1752264036 }
    executor_public_key: "{{alice_key}}"
    outputs:
      roster_alice_moves: result

  - name: Assert Alice sees Bob's live position and action
    type: assert
    statements:
      - 'contains({{roster_alice_moves}}, "317")'
      - 'contains({{roster_alice_moves}}, "building")'
